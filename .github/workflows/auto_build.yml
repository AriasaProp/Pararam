name: Auto Build

on:
  push:
    paths:
      - '.github/workflows/auto_build.yml'
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle CLI
        uses: gradle/actions/setup-gradle@v6.0.1
        with:
          gradle-version: wrapper

      - name: Build
        run: gradle build

      - name: Upload Build
        uses: actions/upload-artifact@v7
        with:
          name: APK
          path: build
