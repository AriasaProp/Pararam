name: Auto Build

on:
  push:
    paths:
      - '.github/workflows/auto_build.yml'
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true
      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '18'
      - name: Set up Gradle CLI
        uses: gradle/actions/setup-gradle@v6.0.1
        with:
          gradle-version: wrapper
      - name: Build
        run: gradle build -Pdebug
      - name: Upload Build Result
        uses: actions/upload-artifact@v7
        with:
          name: APK
          path: app/build
